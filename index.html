<!DOCTYPE html>
<html lang="zh-CN" data-theme="day">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周海鹏 Roc - 个人主页</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌊</text></svg>">
<style>
:root {
  /* 白天模式海洋颜色 */
  --ocean-deep: #001f3f;
  --ocean-mid-deep: #003d5c;
  --ocean-mid: #006994;
  --ocean-shallow: #0088b8;
  --ocean-surface: #2ba8ce;
  --ocean-horizon: #5ec4db;
  
  /* 波浪颜色 */
  --wave1-color: #003d5c;
  --wave2-color: #006994;
  --wave3-color: #0088b8;
  --wave4-color: #2ba8ce;
  --wave5-color: #5ec4db;
  
  /* 波浪透明度 */
  --wave1-opacity: 0.6;
  --wave2-opacity: 0.5;
  --wave3-opacity: 0.4;
  --wave4-opacity: 0.35;
  --wave5-opacity: 0.25;
}

/* 夜晚模式 */
[data-theme="night"] {
  /* 夜晚模式海洋颜色 - 深蓝紫色 */
  --ocean-deep: #0a0e27;
  --ocean-mid-deep: #141b3d;
  --ocean-mid: #1a2550;
  --ocean-shallow: #203262;
  --ocean-surface: #2a4073;
  --ocean-horizon: #344d7f;
  
  /* 夜晚波浪颜色 */
  --wave1-color: #141b3d;
  --wave2-color: #1a2550;
  --wave3-color: #203262;
  --wave4-color: #2a4073;
  --wave5-color: #344d7f;
  
  /* 夜晚波浪透明度增加 */
  --wave1-opacity: 0.7;
  --wave2-opacity: 0.6;
  --wave3-opacity: 0.5;
  --wave4-opacity: 0.45;
  --wave5-opacity: 0.35;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  position: relative;
  /* 使用CSS变量的海洋渐变 */
  background: linear-gradient(to bottom, 
    var(--ocean-deep) 0%,
    var(--ocean-mid-deep) 20%,
    var(--ocean-mid) 40%,
    var(--ocean-shallow) 60%,
    var(--ocean-surface) 80%,
    var(--ocean-horizon) 100%
  );
  transition: background 0.8s ease;
}

/* 海洋容器 */
.ocean {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: 1;
}

/* 真实海洋视频背景 */
.ocean-video {
  position: absolute;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  width: auto;
  height: auto;
  transform: translate(-50%, -50%);
  object-fit: cover;
  z-index: 0;
}

/* 视频遮罩层 - 增加深度感 */
.ocean::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, 
    rgba(0, 31, 63, 0.3) 0%,
    rgba(0, 61, 92, 0.2) 50%,
    transparent 100%
  );
  z-index: 1;
  pointer-events: none;
}

/* 夜晚模式视频遮罩 */
[data-theme="night"] .ocean::before {
  background: linear-gradient(to bottom, 
    rgba(10, 14, 39, 0.5) 0%,
    rgba(20, 27, 61, 0.3) 50%,
    rgba(26, 37, 80, 0.1) 100%
  );
}

/* 波光粼粼效果层 */
.sparkles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  background-image: 
    radial-gradient(circle at 15% 25%, rgba(255, 255, 255, 0.12) 0%, transparent 1.5%),
    radial-gradient(circle at 45% 35%, rgba(255, 255, 255, 0.08) 0%, transparent 2%),
    radial-gradient(circle at 75% 20%, rgba(255, 255, 255, 0.15) 0%, transparent 1.8%),
    radial-gradient(circle at 25% 55%, rgba(255, 255, 255, 0.07) 0%, transparent 1.2%),
    radial-gradient(circle at 85% 45%, rgba(255, 255, 255, 0.1) 0%, transparent 2.2%);
  animation: sparkle-realistic 6s ease-in-out infinite;
  pointer-events: none;
}

@keyframes sparkle-realistic {
  0%, 100% {
    opacity: 0.3;
  }
  50% {
    opacity: 0.6;
  }
}

/* 星空层（仅夜晚模式显示） */
.stars {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s ease;
  background-image:
    /* 大星星 */
    radial-gradient(circle at 10% 15%, white 0%, transparent 0.15%),
    radial-gradient(circle at 25% 8%, white 0%, transparent 0.12%),
    radial-gradient(circle at 40% 20%, white 0%, transparent 0.18%),
    radial-gradient(circle at 65% 12%, white 0%, transparent 0.15%),
    radial-gradient(circle at 80% 18%, white 0%, transparent 0.13%),
    radial-gradient(circle at 90% 10%, white 0%, transparent 0.16%),
    /* 中等星星 */
    radial-gradient(circle at 15% 25%, rgba(255,255,255,0.8) 0%, transparent 0.1%),
    radial-gradient(circle at 35% 30%, rgba(255,255,255,0.8) 0%, transparent 0.12%),
    radial-gradient(circle at 50% 22%, rgba(255,255,255,0.8) 0%, transparent 0.09%),
    radial-gradient(circle at 70% 28%, rgba(255,255,255,0.8) 0%, transparent 0.11%),
    radial-gradient(circle at 85% 25%, rgba(255,255,255,0.8) 0%, transparent 0.1%),
    radial-gradient(circle at 95% 32%, rgba(255,255,255,0.8) 0%, transparent 0.08%),
    /* 小星星 */
    radial-gradient(circle at 8% 35%, rgba(255,255,255,0.6) 0%, transparent 0.06%),
    radial-gradient(circle at 18% 40%, rgba(255,255,255,0.6) 0%, transparent 0.07%),
    radial-gradient(circle at 30% 38%, rgba(255,255,255,0.6) 0%, transparent 0.05%),
    radial-gradient(circle at 45% 42%, rgba(255,255,255,0.6) 0%, transparent 0.06%),
    radial-gradient(circle at 60% 36%, rgba(255,255,255,0.6) 0%, transparent 0.07%),
    radial-gradient(circle at 75% 40%, rgba(255,255,255,0.6) 0%, transparent 0.05%),
    radial-gradient(circle at 88% 38%, rgba(255,255,255,0.6) 0%, transparent 0.06%),
    radial-gradient(circle at 92% 45%, rgba(255,255,255,0.6) 0%, transparent 0.05%);
  animation: stars-twinkle 4s ease-in-out infinite;
}

[data-theme="night"] .stars {
  opacity: 1;
}

@keyframes stars-twinkle {
  0%, 100% {
    opacity: 1;
  }
  50% {
    opacity: 0.6;
  }
}

/* 内容区域（为步骤2准备） */
.content {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  padding: 24px;
}

/* 响应式优化 */
@media (max-width: 768px) {
  .wave {
    width: 300%;
    background-size: 33.33% 100%;
  }
  
  @keyframes wave-animation {
    0% {
      transform: translateX(0);
    }
    100% {
      transform: translateX(-33.33%);
    }
  }
}

/* GPU 加速优化 */
.wave,
.sparkles,
.stars {
  will-change: transform, opacity;
  transform: translateZ(0);
  backface-visibility: hidden;
}

/* ========== 主题切换按钮 ========== */
.theme-toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.25);
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  color: white;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 100;
}

.theme-toggle:hover {
  background: rgba(255, 255, 255, 0.25);
  transform: rotate(180deg) scale(1.1);
  box-shadow: 0 4px 20px rgba(255, 255, 255, 0.3);
}

.theme-toggle:active {
  transform: rotate(180deg) scale(0.95);
}

/* ========== 个人信息卡片 ========== */
.card {
  max-width: 560px;
  width: 100%;
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 24px;
  padding: 48px 40px 40px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
  position: relative;
  animation: card-enter 1s ease-out;
}

@keyframes card-enter {
  from {
    opacity: 0;
    transform: scale(0.95) translateY(20px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

/* 头像 */
.avatar {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  border: 3px solid rgba(255, 255, 255, 0.3);
  overflow: hidden;
  margin: 0 auto 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.1);
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: pointer;
}

.avatar:hover {
  transform: scale(1.08) rotate(5deg);
  border-color: rgba(255, 255, 255, 0.6);
  box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 姓名组 */
.name-group {
  text-align: center;
  margin-bottom: 12px;
  animation: fade-in 1s ease-out 0.2s both;
}

.name-zh {
  font-size: 36px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 4px;
  margin-bottom: 4px;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
}

.name-en {
  font-size: 14px;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.75);
  letter-spacing: 4px;
  text-transform: uppercase;
  transition: letter-spacing 0.3s;
}

.name-en:hover {
  letter-spacing: 6px;
}

/* 标语 */
.tagline {
  font-size: 15px;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.85);
  text-align: center;
  margin-bottom: 32px;
  animation: fade-in 1s ease-out 0.4s both;
}

@keyframes fade-in {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 分隔线 */
.separator {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent);
  margin: 32px 0;
}

/* 关于我区域 */
.about-section {
  margin-bottom: 32px;
  animation: fade-in 1s ease-out 0.6s both;
}

.section-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.6);
  margin-bottom: 12px;
  text-align: center;
}

.about-text {
  font-size: 14px;
  line-height: 1.9;
  color: rgba(255, 255, 255, 0.85);
  text-align: justify;
  text-indent: 2em;
  padding: 0 8px;
}

/* 技能标签 */
.skills-section {
  margin-bottom: 32px;
  animation: fade-in 1s ease-out 0.8s both;
}

.skills-list {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.skill-tag {
  padding: 8px 18px;
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 20px;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.95);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: default;
}

.skill-tag:hover {
  background: rgba(255, 255, 255, 0.28);
  transform: translateY(-3px);
  box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
}

/* 社交链接 */
.social-section {
  animation: fade-in 1s ease-out 1s both;
}

.social-links {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-bottom: 28px;
}

.social-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #ffffff;
  text-decoration: none;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: pointer;
  position: relative;
}

.social-btn svg {
  width: 22px;
  height: 22px;
}

.social-btn:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: translateY(-5px);
  box-shadow: 0 8px 20px rgba(255, 255, 255, 0.3);
}

/* 复制提示 */
.copy-tooltip {
  position: absolute;
  bottom: -30px;
  left: 50%;
  transform: translateX(-50%) scale(0.8);
  background: rgba(0, 0, 0, 0.8);
  color: white;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s;
}

.copy-tooltip.show {
  opacity: 1;
  transform: translateX(-50%) scale(1);
  bottom: -35px;
}

/* Footer */
.footer {
  padding-top: 20px;
  border-top: 1px solid rgba(255, 255, 255, 0.15);
  text-align: center;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.5);
}

/* 响应式优化 */
@media (max-width: 640px) {
  .card {
    padding: 36px 28px 32px;
    max-width: 90%;
  }
  
  .avatar {
    width: 80px;
    height: 80px;
  }
  
  .name-zh {
    font-size: 28px;
    letter-spacing: 2px;
  }
  
  .about-text {
    font-size: 13px;
    line-height: 1.8;
  }
  
  .skill-tag {
    font-size: 12px;
    padding: 6px 14px;
  }
}
</style>
</head>
<body>

<!-- 海洋背景 -->
<div class="ocean">
  <!-- 真实海洋视频背景 -->
  <video class="ocean-video" autoplay loop muted playsinline>
    <source src="https://cdn.pixabay.com/video/2016/03/23/2619-160544471_large.mp4" type="video/mp4">
    <!-- 备用视频源 -->
    <source src="https://assets.mixkit.co/videos/preview/mixkit-calm-sea-water-background-22706-large.mp4" type="video/mp4">
  </video>
  <div class="sparkles"></div>
  <div class="stars"></div>
</div>

<!-- 内容容器 -->
<div class="content">
  <!-- 主题切换按钮 -->
  <button class="theme-toggle" id="themeToggle" aria-label="切换主题">☀️</button>
  
  <div class="card">
    <!-- 头像 -->
    <div class="avatar">
      <img src="avatar.jpg" alt="周海鹏头像" id="avatarImg">
    </div>
    
    <!-- 姓名 -->
    <div class="name-group">
      <div class="name-zh">周海鹏</div>
      <div class="name-en">Roc</div>
    </div>
    
    <!-- 标语 -->
    <p class="tagline">我是一个还在人海中沉浮的哲学家</p>
    
    <div class="separator"></div>
    
    <!-- 关于我 -->
    <div class="about-section">
      <div class="section-title">关于我</div>
      <p class="about-text">我是周海鹏。我始终认同世界会奖励善连接、能独处的两类人。对外乐于与人交流，主动把握机遇拓展视野；对内偏爱安静自省，在喧嚣中聆听内心声音。日常做事踏实有分寸，擅长平衡社交与自我沉淀。常怀庄子"独与天地精神往来"的心境，向外奔赴机遇，向内寻得方向，在热闹与独处间稳步成长。</p>
    </div>
    
    <!-- 技能 -->
    <div class="skills-section">
      <div class="section-title">技能</div>
      <div class="skills-list">
        <span class="skill-tag">Vibe Coding</span>
        <span class="skill-tag">Prompt Engineering</span>
        <span class="skill-tag">哲学思考</span>
        <span class="skill-tag">AI 协作</span>
      </div>
    </div>
    
    <!-- 社交链接 -->
    <div class="social-section">
      <div class="section-title">联系方式</div>
      <div class="social-links">
        <!-- GitHub -->
        <a class="social-btn" href="https://github.com/zhoutom40-star" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12 24 5.37 18.63 0 12 0z"/>
          </svg>
        </a>
        
        <!-- Email -->
        <button class="social-btn" id="emailBtn" aria-label="复制邮箱">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <span class="copy-tooltip" id="copyTooltip">已复制！</span>
        </button>
      </div>
    </div>
    
    <!-- Footer -->
    <div class="footer">
      &copy; 2026 周海鹏 · 在人海中沉浮
    </div>
  </div>
</div>

<script>
// ========== 主题切换功能 ==========
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;

// 从 localStorage 读取保存的主题，默认为白天模式
const savedTheme = localStorage.getItem('theme') || 'day';
html.setAttribute('data-theme', savedTheme);
themeToggle.textContent = savedTheme === 'day' ? '☀️' : '🌙';

// 主题切换
themeToggle.addEventListener('click', () => {
  const currentTheme = html.getAttribute('data-theme');
  const newTheme = currentTheme === 'day' ? 'night' : 'day';
  
  html.setAttribute('data-theme', newTheme);
  themeToggle.textContent = newTheme === 'day' ? '☀️' : '🌙';
  localStorage.setItem('theme', newTheme);
});

// ========== 复制邮箱功能 ==========
const emailBtn = document.getElementById('emailBtn');
const tooltip = document.getElementById('copyTooltip');
const email = 'zhoutom40@gmail.com';

emailBtn.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(email);
    tooltip.classList.add('show');
    setTimeout(() => {
      tooltip.classList.remove('show');
    }, 2000);
  } catch (err) {
    console.error('复制失败:', err);
  }
});

// ========== 头像加载 ==========
const avatarImg = document.getElementById('avatarImg');
avatarImg.onerror = () => {
  avatarImg.style.display = 'none';
  const avatar = avatarImg.parentElement;
  avatar.style.fontSize = '36px';
  avatar.style.fontWeight = '600';
  avatar.style.color = 'rgba(255,255,255,0.9)';
  avatar.textContent = 'R';
};
</script>

</body>
</html>
