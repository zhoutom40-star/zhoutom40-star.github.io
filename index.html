<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周海鹏 Roc</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌊</text></svg>">
<style>
:root {
  --bg: #0f0f0f;
  --card: #1a1a1a;
  --card-border: #2a2a2a;
  --text: #e8e8e8;
  --text-secondary: #888;
  --accent: #6c63ff;
  --accent-light: #8b83ff;
  --tag-bg: rgba(108, 99, 255, 0.1);
  --tag-text: #b0aaff;
  --toggle-bg: #2a2a2a;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
}

[data-theme="light"] {
  --bg: #f8f8f8;
  --card: #ffffff;
  --card-border: #e8e8e8;
  --text: #1a1a1a;
  --text-secondary: #888;
  --accent: #6c63ff;
  --accent-light: #5a52e0;
  --tag-bg: rgba(108, 99, 255, 0.08);
  --tag-text: #6c63ff;
  --toggle-bg: #ddd;
  --shadow: 0 8px 32px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s, color 0.3s;
  padding: 20px;
}

.container {
  max-width: 640px;
  width: 100%;
}

.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 24px;
  padding: 48px 40px;
  box-shadow: var(--shadow);
  position: relative;
  transition: background 0.3s, border-color 0.3s;
}

.theme-toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 40px;
  height: 40px;
  border-radius: 12px;
  border: 1px solid var(--card-border);
  background: var(--toggle-bg);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}

.theme-toggle:hover {
  border-color: var(--accent);
}

.avatar {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #e040fb);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: 700;
  color: #fff;
  margin: 0 auto 20px;
  flex-shrink: 0;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero { text-align: center; margin-bottom: 32px; }

.hero h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 4px;
}

.hero .name-en {
  font-size: 16px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.hero .tagline {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.6;
  max-width: 400px;
  margin: 0 auto;
}

.divider {
  width: 40px;
  height: 3px;
  background: var(--accent);
  border-radius: 2px;
  margin: 28px auto;
}

section { margin-bottom: 28px; }

section:last-child { margin-bottom: 0; }

.section-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.skills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.skill-tag {
  padding: 6px 14px;
  border-radius: 20px;
  background: var(--tag-bg);
  color: var(--tag-text);
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
}

.skill-tag:hover {
  background: var(--accent);
  color: #fff;
}

.social-links {
  display: flex;
  gap: 12px;
}

.social-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: 12px;
  background: var(--tag-bg);
  color: var(--tag-text);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
}

.social-link:hover {
  background: var(--accent);
  color: #fff;
}

.social-link svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

.footer {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: var(--text-secondary);
}

@media (max-width: 480px) {
  .card { padding: 32px 24px; }
  .hero h1 { font-size: 24px; }
  .avatar { width: 80px; height: 80px; font-size: 30px; }
}
</style>
</head>
<body>
<div class="container">

<div class="card">
  <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>

  <div class="hero">
    <div class="avatar" id="avatar">
      <span>R</span>
    </div>
    <h1>周海鹏</h1>
    <div class="name-en">Roc</div>
    <div class="tagline">我是一个还在人海中沉浮的哲学家</div>
  </div>

  <div class="divider"></div>

  <section>
    <div class="section-title">技能</div>
    <div class="skills">
      <span class="skill-tag">Vibe Coding</span>
      <span class="skill-tag">Prompt Engineering</span>
      <span class="skill-tag">哲学思考</span>
      <span class="skill-tag">AI 协作</span>
    </div>
  </section>

  <section>
    <div class="section-title">社交</div>
    <div class="social-links">
      <a class="social-link" href="https://github.com/" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12 24 5.37 18.63 0 12 0z"/></svg>
        GitHub
      </a>
    </div>
  </section>

  <div class="footer">
    &copy; 2026 周海鹏 Roc
  </div>
</div>

</div>

<script>
const toggle = document.getElementById('themeToggle');
const html = document.documentElement;

const savedTheme = localStorage.getItem('theme') || 'dark';
html.setAttribute('data-theme', savedTheme);
toggle.textContent = savedTheme === 'dark' ? '🌙' : '☀️';

toggle.addEventListener('click', () => {
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  toggle.textContent = next === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('theme', next);
});

const avatarImg = document.getElementById('avatar');
const img = document.createElement('img');
img.alt = 'avatar';
img.src = 'avatar.jpg';
img.onerror = () => { img.remove(); };
avatarImg.prepend(img);
</script>
</body>
</html>
